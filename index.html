<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏃 Trondheim-stafetten 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 16px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  .settings { display: flex; gap: 12px; align-items: center; background: #f8fafc; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .settings label { font-size: 13px; color: #555; font-weight: 500; }
  .settings input[type=time] { border: 1.5px solid #c5d8f0; border-radius: 8px; padding: 6px 10px; font-size: 15px; font-weight: 600; color: #1a3a5c; background: #fff; width: 100px; }
  .summary { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { background: #e8f0fb; border-radius: 8px; padding: 8px 12px; text-align: center; flex: 1; min-width: 90px; }
  .stat-label { font-size: 11px; color: #6a8aaa; font-weight: 500; }
  .stat-val { font-size: 16px; font-weight: 700; color: #1a3a5c; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
  thead th { background: #1a3a5c; color: #fff; padding: 8px 6px; text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  thead th:nth-child(2) { text-align: left; }
  thead th:nth-child(3) { text-align: left; }
  tbody tr:nth-child(even) { background: #f4f8fd; }
  tbody tr:nth-child(odd) { background: #fff; }
  td { padding: 8px 6px; vertical-align: middle; }
  .nr { color: #aaa; text-align: center; width: 24px; font-size: 11px; }
  .navn { font-weight: 600; color: #1a3a5c; }
  .loper { color: #555; }
  .dist { text-align: right; color: #888; font-size: 12px; }
  .time-col { text-align: center; font-variant-numeric: tabular-nums; font-weight: 500; color: #333; }
  .adj-col { text-align: center; }
  .adj-wrap { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .adj-btn { background: #e8f0fb; border: none; border-radius: 6px; width: 28px; height: 28px; font-size: 16px; font-weight: 700; color: #1a3a5c; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
  .adj-btn:active { background: #c5d8f0; }
  .adj-val { font-size: 14px; font-weight: 700; color: #1a3a5c; min-width: 32px; text-align: center; font-variant-numeric: tabular-nums; }
  .adj-val.neg { color: #27ae60; }
  .adj-val.pos { color: #e67e22; }
  .eff-col { text-align: center; font-variant-numeric: tabular-nums; font-weight: 700; color: #1a3a5c; }
  .eff-col.changed { color: #e67e22; }
  .mal-col { text-align: center; font-variant-numeric: tabular-nums; color: #555; font-size: 12px; }
  tfoot td { background: #e8f0fb; font-weight: 700; color: #1a3a5c; padding: 10px 6px; font-size: 13px; text-align: center; border-top: 2px solid #c5d8f0; }
  .note { margin-top: 16px; font-size: 11px; color: #aaa; text-align: center; line-height: 1.6; }
  @media (max-width: 480px) {
    .card { padding: 14px; }
    table { font-size: 12px; }
    .adj-btn { width: 24px; height: 24px; font-size: 14px; }
    .adj-val { min-width: 26px; font-size: 13px; }
    h1 { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>🏃 Trondheim-stafetten 2026</h1>
  <p class="subtitle">Oppdaterte starttider basert på planlagt pace</p>

  <div class="settings">
    <label>Starttid:</label>
    <input type="time" id="startTime" value="14:45">
    <div class="summary" id="summary" style="margin-left:auto;"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th style="text-align:left">Etappe</th>
        <th style="text-align:left">Løper</th>
        <th>Dist</th>
        <th>Plan-<br>lagt</th>
        <th>+/− min</th>
        <th>Justert<br>start</th>
        <th>Forv.<br>mål</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td colspan="6" style="text-align:right; color:#6a8aaa; font-weight:500; font-size:11px;">Forventet slutt (etter etappe 10):</td>
        <td id="foot-eff" colspan="1"></td>
        <td id="foot-mal" colspan="1"></td>
      </tr>
    </tfoot>
  </table>

  <p class="note">Trykk + / − for å justere når en løper er foran eller bak skjema.<br>Alle påfølgende starttider oppdateres automatisk.</p>
</div>

<script>
const etapper = [
  { nr:1,  navn:"Promenaden",   loper:"Håvard",    dist:1609, tid_s:6*60+12  },
  { nr:2,  navn:"Rockheim",     loper:"Petter HJ", dist:2590, tid_s:10*60+32 },
  { nr:3,  navn:"Lade",         loper:"Tollef",    dist:1000, tid_s:3*60+50  },
  { nr:4,  navn:"Rosenborg",    loper:"bjørgum",   dist:2430, tid_s:14*60+18 },
  { nr:5,  navn:"Kristiansten", loper:"Kristian",  dist:1750, tid_s:8*60+27  },
  { nr:6,  navn:"Gløshaugen",   loper:"Andreas O", dist:1609, tid_s:6*60+57  },
  { nr:7,  navn:"Byåsen",       loper:"Andreas E", dist:2720, tid_s:14*60+58 },
  { nr:8,  navn:"Sverresborg",  loper:"Stian",     dist:3150, tid_s:13*60+39 },
  { nr:9,  navn:"Kalvskinnet",  loper:"Stenkløv",  dist:800,  tid_s:3*60+30  },
  { nr:10, navn:"Nidaros",      loper:"Håvard",    dist:2580, tid_s:13*60+59 },
];

const adj = new Array(etapper.length).fill(0);

function parseStartMin() {
  const val = document.getElementById('startTime').value || '14:45';
  const [h, m] = val.split(':').map(Number);
  return h * 60 + m;
}

function fmtMin(totalMin) {
  const h = Math.floor(((totalMin % 1440) + 1440) % 1440 / 60);
  const m = Math.round(((totalMin % 1440) + 1440) % 1440 % 60);
  return h + ':' + String(m).padStart(2, '0');
}

function computeBaseStarts() {
  const base = parseStartMin();
  const starts = [];
  let cur = base;
  for (let i = 0; i < etapper.length; i++) {
    starts.push(cur);
    cur += etapper[i].tid_s / 60;
  }
  return starts;
}

function render() {
  const baseStarts = computeBaseStarts();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (let i = 0; i < etapper.length; i++) {
    const e = etapper[i];
    const baseStart = baseStarts[i];
    const effStart = baseStart + adj[i];
    const mal = effStart + e.tid_s / 60;
    const changed = adj[i] !== 0;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="nr">${e.nr}</td>
      <td class="navn">${e.navn}</td>
      <td class="loper">${e.loper}</td>
      <td class="dist">${(e.dist/1000).toFixed(1)}k</td>
      <td class="time-col">${fmtMin(baseStart)}</td>
      <td class="adj-col">
        <div class="adj-wrap">
          <button class="adj-btn" onclick="changeAdj(${i},-1)">−</button>
          <span class="adj-val ${adj[i]<0?'neg':adj[i]>0?'pos':''}" id="adj-${i}">${adj[i]>=0?'+':''}${adj[i]}</span>
          <button class="adj-btn" onclick="changeAdj(${i},1)">+</button>
        </div>
      </td>
      <td class="eff-col ${changed?'changed':''}" id="eff-${i}">${fmtMin(effStart)}</td>
      <td class="mal-col" id="mal-${i}">${fmtMin(mal)}</td>
    `;
    tbody.appendChild(tr);
  }

  updateFooter(baseStarts);
  updateSummary(baseStarts);
}

function updateFooter(baseStarts) {
  const last = etapper.length - 1;
  const effLast = baseStarts[last] + adj[last];
  const malLast = effLast + etapper[last].tid_s / 60;
  document.getElementById('foot-eff').textContent = fmtMin(effLast);
  document.getElementById('foot-mal').textContent = fmtMin(malLast);
}

function updateSummary(baseStarts) {
  const base = parseStartMin();
  const totalSec = etapper.reduce((s, e) => s + e.tid_s, 0);
  const totalDist = etapper.reduce((s, e) => s + e.dist, 0);
  const endMin = base + totalSec / 60;
  const h = Math.floor(totalSec/3600);
  const m = Math.round((totalSec%3600)/60);
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-label">Total dist</div><div class="stat-val">${(totalDist/1000).toFixed(1)} km</div></div>
    <div class="stat"><div class="stat-label">Total tid</div><div class="stat-val">${h}t ${m}m</div></div>
  `;
}

function changeAdj(idx, delta) {
  adj[idx] += delta;
  const baseStarts = computeBaseStarts();
  const effStart = baseStarts[idx] + adj[idx];
  const mal = effStart + etapper[idx].tid_s / 60;
  const changed = adj[idx] !== 0;

  const adjEl = document.getElementById('adj-' + idx);
  adjEl.textContent = (adj[idx] >= 0 ? '+' : '') + adj[idx];
  adjEl.className = 'adj-val ' + (adj[idx]<0?'neg':adj[idx]>0?'pos':'');

  document.getElementById('eff-' + idx).textContent = fmtMin(effStart);
  document.getElementById('eff-' + idx).className = 'eff-col ' + (changed?'changed':'');
  document.getElementById('mal-' + idx).textContent = fmtMin(mal);

  updateFooter(baseStarts);
}

document.getElementById('startTime').addEventListener('change', render);
render();
</script>
</body>
</html>
